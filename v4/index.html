document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4c294590-432a-4460-9ba7-d50e24539c49\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<script src=\"9eb74812-1b14-4de8-8e93-f3ed21d3f4c4\"><\u002Fscript>\n<script src=\"956fb427-9b53-4feb-bfab-be1261c556db\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  .app-root {\n    --page-bg:#EEF0F4; --surface:#FFFFFF; --surface-2:#F8F9FB;\n    --border:#DEE2EA; --border-soft:#E7EAF1; --divider:#EEF0F4;\n    --text:#1C2230; --text-2:#5A6478; --text-3:#9AA3B5; --text-faint:#8A93A6;\n    --chip-bg:#ECEEF3;\n    --shadow:0 12px 34px rgba(20,30,60,0.07); --ink:#1B2A52;\n  }\n  .app-root[data-theme=\"dark\"] {\n    --page-bg:#0E1117; --surface:#161B24; --surface-2:#1B212C;\n    --border:#2C3543; --border-soft:#262E3A; --divider:#242B36;\n    --text:#E7EAF0; --text-2:#AEB6C5; --text-3:#7E8798; --text-faint:#8A93A6;\n    --chip-bg:#222A36;\n    --shadow:0 14px 40px rgba(0,0,0,0.5); --ink:#C3CCE0;\n  }\n  body { background: #EEF0F4; }\n  /* Lane-header controls (delete + reorder grip) stay hidden until the row is hovered. */\n  .lane-row-ctrl { opacity: 0; transition: opacity 0.12s ease; }\n  .lane-row:hover .lane-row-ctrl,\n  .lane-row-ctrl:focus-visible { opacity: 1; }\n  /* Quarter zoom lens: only visible when hovering its quarter cell. */\n  .q-zoom-lens { opacity: 0; transition: opacity 0.12s ease; }\n  .q-cell:hover .q-zoom-lens,\n  .q-zoom-lens:focus-visible { opacity: 1; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"app-root\" data-theme=\"{{ theme }}\" style=\"min-height:100vh; background:var(--page-bg); padding:40px; font-family:Arial,Helvetica,sans-serif; color:var(--text); transition:background 0.2s ease;\">\n  <div ref=\"{{ cardRef }}\" style=\"max-width:1600px; margin:0 auto; background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); overflow:visible;\">\n\n    <div ref=\"{{ headerRef }}\" style=\"padding:24px 36px 22px; border-bottom:1px solid var(--border-soft); display:flex; justify-content:space-between; align-items:flex-start; gap:36px; flex-wrap:wrap;\">\n      <div style=\"flex:0 0 auto;\">\n        <div style=\"font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-faint); font-weight:600;\">Product Delivery<\u002Fdiv>\n        <div style=\"font-size:31px; font-weight:700; letter-spacing:-0.015em; margin-top:7px;\">Feature Roadmap<\u002Fdiv>\n        <div style=\"font-size:14px; color:var(--text-2); margin-top:5px;\">{{ fyLabel }}<\u002Fdiv>\n        <div style=\"font-size:12px; color:var(--text-3); font-weight:500; margin-top:9px;\">{{ metaStr }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 380px; display:flex; flex-direction:column; gap:9px; align-items:flex-end; min-width:300px;\">\n        <sc-if value=\"{{ hasFilters }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end;\">\n            <span style=\"font-size:11px; letter-spacing:0.12em; text-transform:uppercase; font-weight:700; color:var(--text-3);\">Swimlane<\u002Fspan>\n            <sc-for list=\"{{ filterChips }}\" as=\"chip\" hint-placeholder-count=\"4\">\n              <button sc-camel-on-click=\"{{ chip.onToggle }}\" style=\"{{ chip.style }}\">\n                <span style=\"{{ chip.dotStyle }}\"><\u002Fspan>\n                <span>{{ chip.label }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ anyHidden }}\" hint-placeholder-val=\"{{ false }}\">\n              <button sc-camel-on-click=\"{{ onShowAll }}\" style=\"white-space:nowrap; background:transparent; border:none; color:var(--text-2); font-size:12px; font-weight:600; padding:6px 2px; cursor:pointer; font-family:inherit;\">Show all<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasStatusFilters }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end;\">\n              <span style=\"font-size:11px; letter-spacing:0.12em; text-transform:uppercase; font-weight:700; color:var(--text-3);\">Status<\u002Fspan>\n              <sc-for list=\"{{ statusChips }}\" as=\"chip\" hint-placeholder-count=\"3\">\n                <button sc-camel-on-click=\"{{ chip.onToggle }}\" style=\"{{ chip.style }}\">\n                  <span style=\"{{ chip.dotStyle }}\"><\u002Fspan>\n                  <span>{{ chip.label }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ anyStatusHidden }}\" hint-placeholder-val=\"{{ false }}\">\n                <button sc-camel-on-click=\"{{ onShowAllStatus }}\" style=\"white-space:nowrap; background:transparent; border:none; color:var(--text-2); font-size:12px; font-weight:600; padding:6px 2px; cursor:pointer; font-family:inherit;\">Show all<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div ref=\"{{ toolbarRef }}\" style=\"display:flex; align-items:center; gap:10px; padding:13px 36px; background:var(--surface-2); border-bottom:1px solid var(--border-soft); flex-wrap:wrap;\">\n      <button sc-camel-on-click=\"{{ onTemplate }}\" style=\"background:var(--surface); border:1px solid var(--border); color:var(--text-2); font-size:13px; font-weight:500; padding:8px 14px; border-radius:8px; cursor:pointer; font-family:inherit;\">Download template<\u002Fbutton>\n      <label style=\"display:inline-flex; align-items:center; gap:8px; background:#1B2A52; color:#FFFFFF; font-size:13px; font-weight:600; padding:8px 15px; border-radius:8px; cursor:pointer;\">\n        <span style=\"font-size:14px; line-height:1;\">↥<\u002Fspan> Import Excel\n        <input type=\"file\" accept=\".xlsx,.xls,.csv\" style=\"display:none;\" sc-camel-on-change=\"{{ onFile }}\">\n      <\u002Flabel>\n      <button sc-camel-on-click=\"{{ onExportExcel }}\" style=\"background:var(--surface); border:1px solid var(--border); color:var(--text-2); font-size:13px; font-weight:500; padding:8px 14px; border-radius:8px; cursor:pointer; font-family:inherit;\">Export Data<\u002Fbutton>\n      <button sc-camel-on-click=\"{{ onExport }}\" style=\"background:var(--surface); border:1px solid var(--border); color:var(--text-2); font-size:13px; font-weight:500; padding:8px 14px; border-radius:8px; cursor:pointer; font-family:inherit;\">Export Image<\u002Fbutton>\n      <button sc-camel-on-click=\"{{ onReset }}\" style=\"background:transparent; border:none; color:var(--text-2); font-size:13px; font-weight:500; padding:8px 6px; cursor:pointer; font-family:inherit;\">Clear<\u002Fbutton>\n      <span style=\"{{ statusStyle }}\" title=\"{{ status }}\">\n        <span style=\"width:7px; height:7px; border-radius:50%; background:currentColor; flex:0 0 auto;\"><\u002Fspan>\n        <span style=\"overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ status }}<\u002Fspan>\n      <\u002Fspan>\n      <div style=\"margin-left:auto; position:relative;\">\n        <button sc-camel-on-click=\"{{ onToggleAddMenu }}\" style=\"display:inline-flex; align-items:center; gap:6px; background:var(--surface); color:var(--ink); font-size:13px; font-weight:600; padding:8px 15px; border-radius:8px; cursor:pointer; border:1px solid var(--border); font-family:inherit;\">\n          <span style=\"font-size:15px; line-height:1; margin-top:-1px;\">+<\u002Fspan> Add\n        <\u002Fbutton>\n        <sc-if value=\"{{ addMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div sc-camel-on-click=\"{{ onCloseAddMenu }}\" style=\"position:fixed; inset:0; z-index:40;\"><\u002Fdiv>\n          <div style=\"position:absolute; top:calc(100% + 6px); right:0; z-index:41; background:var(--surface); border:1px solid #E0E4EC; border-radius:10px; box-shadow:0 12px 30px rgba(20,30,60,0.16); padding:5px; min-width:172px; display:flex; flex-direction:column;\">\n            <button sc-camel-on-click=\"{{ onAddSwimlane }}\" style=\"display:flex; align-items:center; gap:9px; text-align:left; background:transparent; border:none; color:var(--text); font-size:13px; font-weight:500; padding:9px 11px; border-radius:7px; cursor:pointer; font-family:inherit;\" style-hover=\"background:#F1F3F8;\">\n              <span style=\"width:13px; height:13px; border-radius:3px; background:#AFCBF2; flex:0 0 auto;\"><\u002Fspan> New Swimlane\n            <\u002Fbutton>\n            <button sc-camel-on-click=\"{{ onAddFeature }}\" style=\"display:flex; align-items:center; gap:9px; text-align:left; background:transparent; border:none; color:var(--text); font-size:13px; font-weight:500; padding:9px 11px; border-radius:7px; cursor:pointer; font-family:inherit;\" style-hover=\"background:#F1F3F8;\">\n              <span style=\"width:13px; height:8px; border-radius:2px; background:#A9DCC6; flex:0 0 auto;\"><\u002Fspan> New Feature\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"padding:20px 36px 28px;\">\n      <div style=\"position:relative;\">\n\n        <div style=\"position:absolute; inset:0; z-index:0; pointer-events:none;\">\n          <sc-for list=\"{{ zoomShades }}\" as=\"sh\" hint-placeholder-count=\"0\">\n            <div style=\"{{ sh.style }}\"><\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-for list=\"{{ gridlines }}\" as=\"ln\" hint-placeholder-count=\"5\">\n            <div style=\"{{ ln.style }}\"><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div ref=\"{{ timelineRef }}\" style=\"position:relative; z-index:1;\">\n\n          <div data-sticky-header=\"1\" style=\"{{ stickyHeaderStyle }}\">\n\n          <div style=\"{{ quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\n// VIBE CODED BY MATT (emailmaths@msn.com)\nclass Component extends DCLogic {\n  static STORE_KEY = 'roadmap_items_v2';\n\n  static SAMPLE = [];\n\n  static FY_KEY = 'roadmap_fy_v1';\n  static HINT_KEY = 'roadmap_hint_dismissed_v1';\n  static DENSITY_KEY = 'roadmap_density_v1';\n  static SPRINT_DATES_KEY = 'roadmap_sprint_dates_v1';\n  static THEME_KEY = 'roadmap_theme_v1';\n\n  state = { items: null, fileName: null, status: '', statusType: 'neutral', collapsed: {}, hidden: {}, hiddenStatus: {}, zoomQ: null, helpOpen: false, settingsOpen: false, viewMode: null, fyStart: null, laneOrder: [], laneDrag: null, addMenuOpen: false, editingLane: null, editValue: '', editingFeature: null, featName: '', featStatus: '', trash: [], trashOpen: false, hintDismissed: false, trackW: 0, hint: null, density: null, theme: 'light' };\n\n  toggleLane = (id) => {\n    this.setState(s => ({ collapsed: { ...s.collapsed, [id]: !s.collapsed[id] } }));\n  };\n\n  toggleVisible = (id) => {\n    this.setState(s => ({ hidden: { ...s.hidden, [id]: !s.hidden[id] } }));\n  };\n\n  showAllLanes = () => {\n    this.setState({ hidden: {} });\n  };\n\n  toggleStatusVisible = (key) => {\n    this.setState(s => ({ hiddenStatus: { ...s.hiddenStatus, [key]: !s.hiddenStatus[key] } }));\n  };\n\n  showAllStatuses = () => {\n    this.setState({ hiddenStatus: {} });\n  };\n\n  onQuarterView = () => { this.setState({ viewMode: 'quarter', zoomQ: null }); };\n  onMonthView = () => { this.setState({ viewMode: 'month', zoomQ: null }); };\n  onSprintView = () => { this.setState({ viewMode: 'sprint', zoomQ: null }); };\n  onZoomQuarter = (c) => { this.setState({ zoomQ: c }); };\n  onZoomOut = () => { this.setState({ zoomQ: null }); };\n  onDensityComfortable = () => { this.setState({ density: 'Comfortable' }); try { localStorage.setItem(Component.DENSITY_KEY, 'Comfortable'); } catch (e) {} };\n  onDensityCompact = () => { this.setState({ density: 'Compact' }); try { localStorage.setItem(Component.DENSITY_KEY, 'Compact'); } catch (e) {} };\n  onThemeLight = () => { this.setState({ theme: 'light' }); try { localStorage.setItem(Component.THEME_KEY, 'light'); } catch (e) {} };\n  onThemeDark = () => { this.setState({ theme: 'dark' }); try { localStorage.setItem(Component.THEME_KEY, 'dark'); } catch (e) {} };\n  onFyJan = () => { this.setState({ fyStart: 'jan' }); try { localStorage.setItem(Component.FY_KEY, 'jan'); } catch (e) {} };\n  onFyApr = () => { this.setState({ fyStart: 'apr' }); try { localStorage.setItem(Component.FY_KEY, 'apr'); } catch (e) {} };\n  onSprintDatesShow = () => { this.setState({ showSprintDates: true }); try { localStorage.setItem(Component.SPRINT_DATES_KEY, 'on'); } catch (e) {} };\n  onSprintDatesHide = () => { this.setState({ showSprintDates: false }); try { localStorage.setItem(Component.SPRINT_DATES_KEY, 'off'); } catch (e) {} };\n\n  onOpenHelp = () => { this.setState({ helpOpen: true }); };\n  onCloseHelp = () => { this.setState({ helpOpen: false }); };\n  onOpenSettings = () => { this.setState({ settingsOpen: true }); };\n  onCloseSettings = () => { this.setState({ settingsOpen: false }); };\n\n  // --- Rename swimlane ----------------------------------------------------\n  editInputRef = React.createRef();\n  onEditChange = (ev) => { this.setState({ editValue: ev.target.value }); };\n  onEditKeyDown = (ev) => {\n    ev.stopPropagation();\n    if (ev.key === 'Enter') { ev.preventDefault(); this.renameLane(this.state.editingLane, this.state.editValue); }\n    else if (ev.key === 'Escape') { this.setState({ editingLane: null }); }\n  };\n  onEditCommit = () => { if (this.state.editingLane != null) this.renameLane(this.state.editingLane, this.state.editValue); };\n\n  // --- Edit feature (name + status) --------------------------------------\n  featInputRef = React.createRef();\n  onFeatNameChange = (ev) => { this.setState({ featName: ev.target.value }); };\n  onFeatStatusChange = (ev) => { this.setState({ featStatus: ev.target.value }); };\n  onFeatKeyDown = (ev) => {\n    ev.stopPropagation();\n    if (ev.key === 'Enter') { ev.preventDefault(); this.onFeatSave(); }\n    else if (ev.key === 'Escape') { this.onFeatCancel(); }\n  };\n  onFeatCancel = () => { this.setState({ editingFeature: null }); };\n  // Commit when focus leaves both inline fields (but not when tabbing between them).\n  onFeatBlur = () => {\n    setTimeout(() => {\n      const a = document.activeElement;\n      if (a && a.getAttribute && a.getAttribute('data-feat-edit') === '1') return;\n      if (this.state.editingFeature != null) this.onFeatSave();\n    }, 0);\n  };\n  onFeatSave = () => {\n    const k = this.state.editingFeature;\n    if (k == null) return;\n    const name = String(this.state.featName || '').trim();\n    const status = String(this.state.featStatus || '').trim();\n    const arr = this.getItems().map(x => ({ ...x }));\n    if (arr[k]) { if (name) arr[k].name = name; arr[k].status = status; }\n    this.persistItems(arr);\n    this.setState({ items: arr, editingFeature: null, hint: Component.HINTS.editFeature });\n  };\n\n  renameLane(oldId, newName) {\n    newName = String(newName || '').trim();\n    if (!newName || newName === oldId) { this.setState({ editingLane: null }); return; }\n    const arr = this.getItems().map(it => (it.lane === oldId ? { ...it, lane: newName } : { ...it }));\n    const migrate = (obj) => {\n      const o = { ...obj };\n      if (Object.prototype.hasOwnProperty.call(o, oldId)) { o[newName] = o[oldId]; delete o[oldId]; }\n      return o;\n    };\n    let order = (this.state.laneOrder || []).slice();\n    const oi = order.indexOf(oldId);\n    if (oi > -1) {\n      if (order.includes(newName)) order.splice(oi, 1); // merging into an existing lane\n      else order[oi] = newName;\n    } else if (!order.includes(newName)) { order.push(newName); }\n    this.persistItems(arr, undefined, order);\n    this.setState({ items: arr, laneOrder: order, collapsed: migrate(this.state.collapsed), hidden: migrate(this.state.hidden), editingLane: null, editValue: '', hint: Component.HINTS.renameLane });\n  }\n  stop = (ev) => { ev.stopPropagation(); };\n\n  // --- Add swimlane / feature --------------------------------------------\n  onToggleAddMenu = () => { this.setState(s => ({ addMenuOpen: !s.addMenuOpen })); };\n  onCloseAddMenu = () => { this.setState({ addMenuOpen: false }); };\n  uniqueLaneName(base) {\n    const names = this.currentLaneNames();\n    let n = base, i = 2;\n    while (names.includes(n)) { n = base + ' ' + i; i++; }\n    return n;\n  }\n  onAddSwimlane = () => {\n    const order = this.currentLaneNames();\n    const name = this.uniqueLaneName('New swimlane');\n    order.unshift(name); // always add at the top\n    const items = this.getItems().map(x => ({ ...x })); // materialize (sample -> real) so state is consistent\n    this.persistItems(items, undefined, order);\n    this.setState({ items, laneOrder: order, addMenuOpen: false, editingLane: name, editValue: name, hint: Component.HINTS.addSwimlane });\n  };\n  onAddFeature = () => {\n    // Add the new feature to the top-most existing swimlane (create one only if there are none),\n    // and place it at the top of that lane.\n    const order = this.currentLaneNames();\n    const items = this.getItems().map(x => ({ ...x }));\n    let lane = order[0];\n    if (!lane) { lane = this.uniqueLaneName('New swimlane'); order.unshift(lane); }\n    items.unshift({ lane, name: 'New feature', ids: '', s: 0, e: 0, ms: 0, me: 2, status: '', unresolved: false });\n    const key = 0;\n    this.persistItems(items, undefined, order);\n    // Make the new bar visible & editable: expand and unhide its lane, and unhide the blank-status filter.\n    const collapsed = { ...this.state.collapsed }; delete collapsed[lane];\n    const hidden = { ...this.state.hidden }; delete hidden[lane];\n    const hiddenStatus = { ...this.state.hiddenStatus }; delete hiddenStatus['∅'];\n    this.setState({ items, laneOrder: order, collapsed, hidden, hiddenStatus, addMenuOpen: false, editingFeature: key, featName: 'New feature', featStatus: '', hint: Component.HINTS.addFeature });\n  };\n\n  // --- Delete + trash (undo) ---------------------------------------------\n  trashId() { return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7); }\n\n  deleteFeature = (key) => {\n    const items = this.getItems().map(x => ({ ...x }));\n    if (key == null || key < 0 || key >= items.length) return;\n    const removed = items[key];\n    const rec = { id: this.trashId(), type: 'feature', label: removed.name || '(unnamed feature)', lane: removed.lane, index: key, item: { ...removed }, ts: Date.now() };\n    items.splice(key, 1);\n    const trash = [rec, ...(this.state.trash || [])];\n    this.persistItems(items, undefined, undefined, trash);\n    this.setState({ items, trash, editingFeature: null, status: 'Deleted “' + rec.label + '” · undo from the Recycle Bin', statusType: 'neutral', hint: Component.HINTS.deleted });\n  };\n\n  deleteSwimlane = (laneId) => {\n    const all = this.getItems().map(x => ({ ...x }));\n    const order = this.currentLaneNames();\n    const feats = [];\n    all.forEach((it, i) => { if (it.lane === laneId) feats.push({ index: i, item: { ...it } }); });\n    const remaining = all.filter(it => it.lane !== laneId);\n    const newOrder = order.filter(n => n !== laneId);\n    const rec = { id: this.trashId(), type: 'swimlane', label: laneId, lanePos: Math.max(0, order.indexOf(laneId)), feats, ts: Date.now() };\n    const trash = [rec, ...(this.state.trash || [])];\n    this.persistItems(remaining, undefined, newOrder, trash);\n    this.setState({ items: remaining, laneOrder: newOrder, trash, editingLane: null, status: 'Deleted swimlane “' + laneId + '” (' + feats.length + ' feature' + (feats.length === 1 ? '' : 's') + ') · undo from the Recycle Bin', statusType: 'neutral', hint: Component.HINTS.deleted });\n  };\n\n  restoreFromTrash = (id) => {\n    const rec = (this.state.trash || []).find(r => r.id === id);\n    if (!rec) return;\n    const trash = (this.state.trash || []).filter(r => r.id !== id);\n    const items = this.getItems().map(x => ({ ...x }));\n    const order = this.currentLaneNames();\n    if (rec.type === 'board') {\n      // Bring the cleared board back (merged ahead of anything added since the clear).\n      const restored = (rec.items || []).map(x => ({ ...x }));\n      const merged = restored.concat(items);\n      const newOrder = (rec.laneOrder || []).slice();\n      order.forEach(n => { if (!newOrder.includes(n)) newOrder.push(n); });\n      this.persistItems(merged, rec.fileName, newOrder, trash);\n      this.setState({ items: merged, laneOrder: newOrder, fileName: rec.fileName || this.state.fileName, trash, status: 'Restored the board', statusType: 'ok', hint: Component.HINTS.restored });\n      return;\n    }\n    if (rec.type === 'feature') {\n      if (!order.includes(rec.item.lane)) order.splice(Math.min(rec.index, order.length), 0, rec.item.lane);\n      items.splice(Math.min(rec.index, items.length), 0, { ...rec.item });\n    } else {\n      if (!order.includes(rec.label)) order.splice(Math.min(rec.lanePos, order.length), 0, rec.label);\n      rec.feats.slice().sort((a, b) => a.index - b.index).forEach(f => { items.splice(Math.min(f.index, items.length), 0, { ...f.item }); });\n    }\n    this.persistItems(items, undefined, order, trash);\n    this.setState({ items, laneOrder: order, trash, status: 'Restored “' + rec.label + '”', statusType: 'ok', hint: Component.HINTS.restored });\n  };\n\n  removeFromTrash = (id) => {\n    const trash = (this.state.trash || []).filter(r => r.id !== id);\n    this.persistItems(this.getItems(), undefined, undefined, trash);\n    this.setState({ trash });\n  };\n\n  clearTrash = () => {\n    this.persistItems(this.getItems(), undefined, undefined, []);\n    this.setState({ trash: [], trashOpen: false });\n  };\n\n  onOpenTrash = () => this.setState({ trashOpen: true });\n  onCloseTrash = () => this.setState({ trashOpen: false });\n\n  onDismissHint = () => {\n    try { localStorage.setItem(Component.HINT_KEY, '1'); } catch (e) {}\n    this.setState({ hintDismissed: true, hint: null });\n  };\n\n  // Contextual \"next best action\" hints — shown in the footer pill after an action.\n  static HINTS = {\n    intro:        'Double-click a bar to edit · drag a bar to reschedule',\n    addSwimlane:  'New lane added — give it a name, then add features with + Add',\n    addFeature:   'Drag the new bar sideways to reschedule, or onto another lane to move it',\n    editFeature:  'Tip: drag a bar’s left or right edge to change its start or end',\n    renameLane:   'Tip: drag the handle at the right of a lane header to reorder lanes',\n    reschedule:   'For finer dates, switch to Month view in Settings — then Export when ready',\n    reassign:     'Moved to another swimlane — drag again to fine-tune its dates',\n    reorderRow:   'Reordered — Export Data keeps this exact swimlane and feature order',\n    reorderLane:  'Lanes reordered — use Export Image to share the current view',\n    deleted:      'Deleted — you can restore it anytime from the Recycle Bin',\n    cleared:      'Board cleared — restore the whole roadmap from the Recycle Bin',\n    restored:     'Restored — drag bars to reschedule or Export to share',\n  };\n  showHint(key) {\n    if (this.state.hintDismissed && key === 'intro') return; // intro stays dismissed once closed\n    const text = Component.HINTS[key] || key;\n    this.setState({ hint: text });\n  }\n\n  // Measure a row track's pixel width so we can tell whether a bar can hold name + status.\n  measureTrack = () => {\n    requestAnimationFrame(() => {\n      const node = this.timelineRef.current;\n      if (!node) return;\n      const tr = node.querySelector('[data-track]');\n      const w = tr ? Math.round(tr.getBoundingClientRect().width) : 0;\n      if (w && Math.abs(w - (this.state.trackW || 0)) > 1) this.setState({ trackW: w });\n    });\n  };\n\n  componentDidUpdate() {\n    if (!this.state.trackW) this.measureTrack(); // catch first render once tracks exist\n  }\n\n  // --- Reorder swimlanes (drag the header grip; features follow their lane) ---\n  currentLaneNames() {\n    const order = (this.state.laneOrder || []).slice();\n    this.deriveLaneOrder(this.getItems()).forEach(n => { if (!order.includes(n)) order.push(n); });\n    return order;\n  }\n  beginLaneReorder(ev, laneId) {\n    ev.preventDefault();\n    ev.stopPropagation();\n    const order = this.currentLaneNames();\n    if (order.indexOf(laneId) < 0) return;\n    const node = this.timelineRef.current;\n    const headers = node ? [...node.querySelectorAll('[data-lane-header]')].map(el => {\n      const r = el.getBoundingClientRect();\n      return { id: el.getAttribute('data-lane-header'), mid: r.top + r.height / 2 };\n    }) : [];\n    this._laneDrag = { id: laneId, order, headers };\n    this.setState({ laneDrag: { id: laneId, overId: laneId } });\n    window.addEventListener('pointermove', this.onLaneReorderMove);\n    window.addEventListener('pointerup', this.onLaneReorderEnd);\n  }\n  onLaneReorderMove = (ev) => {\n    const d = this._laneDrag;\n    if (!d) return;\n    let overId = d.id, bestDist = Infinity;\n    d.headers.forEach(h => { const dist = Math.abs(h.mid - ev.clientY); if (dist < bestDist) { bestDist = dist; overId = h.id; } });\n    const cur = this.state.laneDrag;\n    if (!cur || cur.overId !== overId) this.setState({ laneDrag: { id: d.id, overId } });\n  };\n  onLaneReorderEnd = () => {\n    window.removeEventListener('pointermove', this.onLaneReorderMove);\n    window.removeEventListener('pointerup', this.onLaneReorderEnd);\n    const d = this._laneDrag;\n    const st = this.state.laneDrag;\n    this._laneDrag = null;\n    if (!d || !st || st.overId === d.id) { this.setState({ laneDrag: null }); return; }\n    const movingDown = d.order.indexOf(d     'Feature Name — the label shown on the bar.',\n            'Swimlane — the row/category; lanes are created automatically from these values.',\n            'Start / End — a full date (e.g. 24 Jun 2026, 2026-06-24, or a real Excel date) snaps the bar to the sprint that date falls in. Month text (\"JUN 2026\") and quarter text (\"Q2 2026\") still work too.',\n            'Export Data writes Start / End back as full dates — the start (Wednesday) and end (Tuesday) of the sprints the bar spans.',\n            'If Start/End can\\'t be read for a feature, it is parked in Q1 with an orange “!” marker — drag it onto the timeline to resolve it.',\n            'Status — shown as text on the bar (e.g. In Progress, Planned).',\n            'Description — optional free text; it round-trips (imported and written back out on Export Data).',\n          ],\n        },\n        {\n          icon: '▭', soft: '#FBF3E2', ink: '#8A5E18', title: 'Reading the timeline',\n          steps: [\n            'Six quarters are shown: four for the current year and two for next year (the planning horizon).',\n            'Each swimlane is colour-coded; bars use a soft pastel fill with the status labelled inline.',\n            'Open Settings (the gear in the footer) to switch View — Quarter for the six-quarter overview, Month to break each quarter into three months (JAN, FEB, MAR…), or Sprint to break each quarter into seven sprints (.1–.7).',\n            'Sprints run on a fixed cadence: .1–.6 are two weeks and .7 is one week, every one starting on a Wednesday and ending on a Tuesday. Hover a sprint header to see its exact dates.',\n            'Settings also sets FY start: Jan means Q1 = Jan–Mar; Apr means Q1 = Apr–Jun. Quarter labels, month columns and the fiscal-year headers all shift to suit.',\n            'On a short bar the status moves just outside the bar so the name still fits. If the bar is too short to show the name at all, the full name and status appear just outside in brackets — e e Swimlane chips (top right) to show or hide whole lanes.',\n            'Use the Status chips to show or hide features by status.',\n            'Click a swimlane header to collapse or expand its bars. \"Show all\" resets a filter.',\n          ],\n        },\n        {\n          icon: '↥', soft: '#EDF3FC', ink: '#2C508A', title: 'Export & share',\n          steps: [\n            'Export Data — download the current roadmap as an Excel file (same column format as import), in the exact swimlane and feature order shown.',\n            'Export Image — save a picture of just the timeline; the title bar, toolbar, footer and drag handles are left out. An empty board exports as blank space.',\n            'Clear — empties the board, but it goes to the Recycle Bin so you can restore the whole roadmap.',\n          ],\n        },\n      ],\n      quarters, gridlines, zoomShades, months: monthsVis, sprintCells: sprintCellsVis, showSprintEndDates, zoomed,\n      isMonth, isSprint,\n      zoomed, notZoomed: !zoomed, showMonthRow,\n      onZoomOut: this.onZoomOut, zoomQuarterLabel, zoomOutBtnStyle,\n      yearRowStyle, quarterRowStyle, monthRowStyle, sprintRowStyle,\n      stickyHeaderStyle,\n      yearCurrentSpan, yearNextSpan,\n      onQuarterView: this.onQuarterView,\n      onMonthView: this.onMonthView,\n      onSprintView: this.onSprintView,\n      quarterBtnStyle, monthBtnStyle, sprintBtnStyle,\n      onSprintDatesShow: this.onSprintDatesShow,\n      onSprintDatesHide: this.onSprintDatesHide,\n      sprintDatesShowBtnStyle, sprintDatesHideBtnStyle, sprintDatesDisabled,\n      onDensityComfortable: this.onDensityComfortable,\n      onDensityCompact: this.onDensityCompact,\n      comfortableBtnStyle, compactBtnStyle,\n      theme: this.state.theme,\n      onThemeLight: this.onThemeLight,\n      onThemeDark: this.onThemeDark,\n      lightBtnStyle, darkBtnStyle,\n      onFyJan: this.onFyJan, onFyApr: this.onFyApr,\n      janBtnStyle, aprBtnStyle,\n      shade2027Style,\n      barLineHeight: barH + 'px',\n      yearCurrent: zoomed ? fyText(fyStartYear + Math.floor(zq / 4)) : fyText(fyStartYear),\n      yearNextLabel: zoomed ? '' : (fyText(fyStartYear + 1) + ' · PLANNING'),\n      fyLabel: fyTextFull(fyStartYear) + ' – H1 ' + fyTextFull(fyStartYear + 1) + ' · delivery plan across investment streams',\n      metaStr: hasData\n        ? (ITEMS.length + ' initiatives · ' + LANES.length + (LANES.length === 1 ? ' stream' : ' streams') + ' · ' + (isSprint ? '42 sprints' : isMonth ? '18 months' : '6 quarters') + ' · as of ' + nowQuarterLabel)\n        : '6 quarters · awaiting import',\n      status: this.state.status,\n      statusStyle,\n      onFile: this.onFile,\n      onReset: this.onReset,\n      addMenuOpen: this.state.addMenuOpen,\n      onToggleAddMenu: this.onToggleAddMenu,\n      onCloseAddMenu: this.onCloseAddMenu,\n      onAddSwimlane: this.onAddSwimlane,\n      onAddFeature: this.onAddFeature,\n      onTemplate: this.onTemplate,\n      onExport: this.onExport,\n      onExportExcel: this.onExportExcel,\n      cardRef: this.cardRef,\n      toolbarRef: this.toolbarRef,\n      timelineRef: this.timelineRef,\n      footerRef: this.footerRef,\n      headerRef: this.headerRef,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
