<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .box {
      text-align: center;
      background: white;
      padding: 2rem 3rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { margin: 0 0 0.5rem; font-size: 1.5rem; color: #333; }
    p { color: #555; margin: 0.5rem 0; }
    #countdown { font-size: 2.5rem; font-weight: bold; color: #0066cc; margin: 1rem 0; }
    a { color: #0066cc; text-decoration: none; word-break: break-all; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <h1>You are being redirected</h1>
    <p>You will be taken to the upgraded app page in</p>
    <div id="countdown">5</div>
    <p>seconds, or click the link below:</p>
    <br>
    <a id="redirect-link" href="https://xyberangel.github.io/Roadmap/v4/">Upgraded Version</a>
  </div>

  <script>
    const TARGET_URL = "https://xyberangel.github.io/Roadmap/v4/";
    const DELAY_SECONDS = 5;

    document.getElementById("redirect-link").href = TARGET_URL;
    document.getElementById("redirect-link").textContent = "Upgraded Version";

    let remaining = DELAY_SECONDS;
    const countdownEl = document.getElementById("countdown");

    const timer = setInterval(() => {
      remaining--;
      countdownEl.textContent = remaining;
      if (remaining <= 0) {
        clearInterval(timer);
        window.location.href = TARGET_URL;
      }
    }, 1000);
  </script>
</body>
</html>
